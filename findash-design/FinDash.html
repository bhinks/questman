<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinDash — Finance Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
/* ============================================================
   App shell layout + responsive
   ============================================================ */
.app-shell {
  display: grid;
  grid-template-columns: 248px 1fr;
  min-height: 100vh;
}

/* nav rail */
.nav-rail {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(13,14,24,0.6), rgba(8,9,16,0.4));
  backdrop-filter: blur(8px);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-size: 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
}
.nav-item:hover { background: var(--panel-2); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(28,226,255,0.14), rgba(28,226,255,0.03));
  border-color: rgba(28,226,255,0.28);
  color: var(--text);
  box-shadow: inset 2px 0 0 var(--cyan);
}
.nav-item.active svg { color: var(--cyan); filter: drop-shadow(0 0 4px var(--cyan)); }

/* main column */
.main-col { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 18px;
  padding: 14px 26px;
  border-bottom: 1px solid var(--line);
  background: rgba(6,6,12,0.78);
  backdrop-filter: blur(12px);
}
.mobile-brand { display: none; }
.searchbox {
  flex: 1; max-width: 460px;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  transition: border-color .15s;
}
.searchbox:focus-within { border-color: var(--line-bright); }
.searchbox input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font-ui); font-size: 13.5px;
}
.searchbox input::placeholder { color: var(--text-faint); }
.kbd {
  font-size: 11px; color: var(--text-faint);
  padding: 2px 6px; border: 1px solid var(--line); border-radius: 5px;
}
.topbar-meta { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px solid var(--line); border-radius: 9px; background: var(--panel); }
.icon-btn { padding: 9px; color: var(--text-dim); }
.icon-btn:hover { color: var(--text); }

.content {
  padding: 26px;
  max-width: var(--maxw);
  width: 100%;
  margin: 0 auto;
}

/* bottom nav (mobile) */
.bottom-nav { display: none; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1100px) {
  .split-grid { grid-template-columns: 1fr !important; }
  .hero-grid { grid-template-columns: 1fr !important; }
  .hero-grid > div:last-child { border-left: none !important; border-top: 1px solid var(--line); }
}
@media (max-width: 860px) {
  .app-shell { grid-template-columns: 1fr; }
  .nav-rail { display: none; }
  .mobile-brand { display: block; }
  .searchbox { max-width: none; }
  .topbar-meta { display: none; }
  .metric-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .upload-grid { grid-template-columns: 1fr !important; }
  .upload-grid > div:last-child { border-left: none !important; }
  .content { padding: 18px 16px 92px; }
  .bottom-nav {
    display: grid; grid-template-columns: repeat(4, 1fr);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: rgba(8,9,16,0.92);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line-2);
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  .bn-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 7px 4px; border: none; background: none; cursor: pointer;
    color: var(--text-faint); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.03em; border-radius: 9px; transition: all .15s;
  }
  .bn-item.active { color: var(--cyan); }
  .bn-item.active svg { filter: drop-shadow(0 0 5px var(--cyan)); }
}
@media (max-width: 480px) {
  .metric-grid { grid-template-columns: 1fr !important; }
  .split-grid, .hero-grid { gap: 16px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>

</body>
</html>
