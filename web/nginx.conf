# =====================================================================
# nginx config for Questman frontend.
#
# Three responsibilities:
#   1. Serve the SPA — every unknown route falls through to index.html
#      so React Router-style navigation works on direct loads.
#   2. Proxy /api → backend:3001 so the frontend can hit same-origin
#      (no CORS in prod; matches server.ts which disables CORS in
#      production).
#   3. Proxy /socket.io with WebSocket upgrade headers so the
#      socket.io-client connection works through the proxy.
# =====================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Light caching for JS/CSS hashed assets; never-cache index.html.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # REST proxy.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived requests (file uploads, long polling) need this.
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # WebSocket proxy — Upgrade + Connection headers are mandatory.
    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sockets should not be auto-closed by nginx mid-stream.
        proxy_read_timeout 86400s;
    }
}
