<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questman — Handler</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { height: 100%; }
  /* comms-dashboard grid: feed column + analysis rail */
  .hdash { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; align-items: start; }
  .hcol { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  /* slim patterns, 2-up where the rail is wide enough, 1-up when narrow */
  .hpat { display: grid; grid-template-columns: repeat(auto-fill, minmax(218px, 1fr)); gap: 12px; }
  @media (max-width: 1180px) {
    .hdash { grid-template-columns: 1fr; }
    .hpat { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  }
</style>
</head>
<body class="qm-bg">
<div id="root"></div>

<script type="text/babel" src="handler-shell.jsx"></script>
<script type="text/babel" src="handler-data.jsx"></script>
<script type="text/babel" src="handler-view.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "persona": "v1ktor",
  "skin": "default"
}/*EDITMODE-END*/;

const SKINS = [
  { value: 'default',    label: 'Cyan (stock)' },
  { value: 'synthwave',  label: 'Synthwave' },
  { value: 'matrix',     label: 'Matrix' },
  { value: 'arctic',     label: 'Arctic' },
  { value: 'edgerunner', label: 'Edgerunner' },
];

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const el = document.documentElement;
    if (t.skin && t.skin !== 'default') el.setAttribute('data-theme', t.skin);
    else el.removeAttribute('data-theme');
  }, [t.skin]);

  return (
    <React.Fragment>
      <AppShell>
        <HandlerView tweaks={t} />
      </AppShell>

      <TweaksPanel>
        <TweakSection label="Handler" />
        <TweakSelect label="Persona voice" value={t.persona}
                     options={[
                       { value: 'v1ktor', label: 'V1KTOR — Fixer' },
                       { value: 'motherboard', label: 'Motherboard — Maternal' },
                       { value: 'koan', label: 'Koan-9 — Zen' },
                     ]}
                     onChange={(v) => setTweak('persona', v)} />
        <TweakSection label="Skin" />
        <TweakSelect label="Neon skin" value={t.skin}
                     options={SKINS}
                     onChange={(v) => setTweak('skin', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
